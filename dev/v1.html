:root {
  --amber: #fbbf24;
  --amber-light: #fcd34d;
  --amber-dark: #f59e0b;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(251,191,36,0.2); border-radius: 9999px; }

/* ── Transitions ── */
.fade-in { opacity: 0; transform: translateY(18px); transition: opacity 0.6s ease, transform 0.6s ease; }
.fade-in.visible { opacity: 1; transform: translateY(0); }

/* ── Toolbar pill ── */
.toolbar-pill {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  z-index: 100;
  display: flex; align-items: center; gap: 18px;
  padding: 0 20px; height: 48px; border-radius: 9999px;
  border: 1px solid rgba(255,255,255,0.08);
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04) inset;
  transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
}
.toolbar-pill.dark { background: rgba(10,10,15,0.82); }
.toolbar-pill.light {
  background: rgba(255,255,255,0.82);
  border-color: rgba(0,0,0,0.08);
  box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 0 0 1px rgba(255,255,255,0.9) inset;
}

.toolbar-divider {
  width: 1px; height: 20px;
  background: rgba(255,255,255,0.1);
  flex-shrink: 0;
  transition: background 0.3s;
}
.light .toolbar-divider { background: rgba(0,0,0,0.1); }

/* Logo badge */
.logo-badge {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px; border-radius: 10px; cursor: pointer;
  border: 1px solid rgba(251,191,36,0.25);
  font-weight: 700; font-size: 12px; letter-spacing: -0.05em;
  font-family: 'Sora', sans-serif;
  transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
  color: white;
  flex-shrink: 0;
}
.light .logo-badge { color: #18181b; }
.logo-badge:hover {
  border-color: var(--amber);
  box-shadow: 0 0 14px rgba(251,191,36,0.45);
}
.logo-badge:active { transform: scale(0.93); }

/* Toolbar icon buttons */
.tb-btn {
  background: none; border: none; cursor: pointer; padding: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0.55; color: white;
  transition: opacity 0.2s, color 0.2s, transform 0.15s;
}
.light .tb-btn { color: #3f3f46; }
.tb-btn:hover { opacity: 1; color: var(--amber); transform: scale(1.12); }
.tb-btn:active { transform: scale(0.9); }
.tb-btn.theme-btn { opacity: 1; color: var(--amber); }
.light .tb-btn.theme-btn { color: #52525b; }
.tb-btn.theme-btn:hover { color: var(--amber-light); }
.light .tb-btn.theme-btn:hover { color: var(--amber-dark); }

/* ── Page root ── */
.page {
  min-height: 100vh;
  font-family: 'DM Sans', system-ui, sans-serif;
  position: relative; overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}
.page.dark { background: #0a0a0f; color: #fff; }
.page.light { background: #f5f3ee; color: #18181b; }

/* ── Atmospheric glows ── */
.glow-wrap {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
}
.glow-1 {
  position: absolute; top: -18%; left: 30%;
  width: 600px; height: 600px; border-radius: 9999px;
  background: var(--amber);
  filter: blur(120px); opacity: 0.13;
  transition: opacity 0.3s;
}
.glow-2 {
  position: absolute; bottom: -10%; right: 10%;
  width: 400px; height: 400px; border-radius: 9999px;
  background: #f97316;
  filter: blur(100px); opacity: 0.08;
}
.dot-grid {
  position: absolute; inset: 0;
  background-image: radial-gradient(circle at 1px 1px, white 1px, transparent 0);
  background-size: 32px 32px;
  opacity: 0.025;
}
.light .glow-1 { background: #fcd34d; opacity: 0.18; }
.light .dot-grid { display: none; }

/* ── Main content ── */
main {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  padding: 140px 16px 96px;
}

/* Badge */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 600;
  padding: 4px 12px; border-radius: 9999px; margin-bottom: 28px;
  transition: background 0.3s, color 0.3s, border-color 0.3s;
}
.dark .badge { background: rgba(251,191,36,0.1); color: var(--amber); border: 1px solid rgba(251,191,36,0.22); }
.light .badge { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }

/* Headline */
h1.headline-main {
  font-family: 'Sora', sans-serif;
  font-size: clamp(38px, 8vw, 60px);
  font-weight: 800; line-height: 1.08;
  text-align: center; letter-spacing: -0.03em;
  margin-bottom: 6px;
}
h1.headline-accent {
  font-family: 'Sora', sans-serif;
  font-size: clamp(38px, 8vw, 60px);
  font-weight: 800; line-height: 1.08;
  text-align: center; letter-spacing: -0.03em;
  margin-bottom: 20px;
  color: var(--amber);
}
p.sub {
  font-size: 16px; text-align: center;
  max-width: 340px;
  transition: color 0.3s;
}
.dark p.sub { color: rgba(255,255,255,0.42); }
.light p.sub { color: #71717a; }

/* Search bar */
.search-wrap {
  width: 100%; max-width: 480px; margin-top: 36px;
  position: relative;
}
.search-wrap .search-icon {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  pointer-events: none;
  transition: color 0.2s;
}
.dark .search-wrap .search-icon { color: rgba(255,255,255,0.3); }
.light .search-wrap .search-icon { color: #a1a1aa; }
.search-input {
  width: 100%; padding: 13px 16px 13px 42px;
  border-radius: 14px; border: 1px solid;
  font-size: 14px; font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.3s, color 0.3s;
}
.dark .search-input {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.1);
  color: #fff;
}
.dark .search-input::placeholder { color: rgba(255,255,255,0.28); }
.dark .search-input:focus {
  border-color: rgba(251,191,36,0.55);
  box-shadow: 0 0 0 3px rgba(251,191,36,0.12);
}
.light .search-input {
  background: #fff;
  border-color: #d4d4d8;
  color: #18181b;
}
.light .search-input::placeholder { color: #a1a1aa; }
.light .search-input:focus {
  border-color: var(--amber);
  box-shadow: 0 0 0 3px rgba(251,191,36,0.14);
}
.search-hint { font-size: 12px; text-align: center; margin-top: 10px; }
.dark .search-hint { color: rgba(255,255,255,0.35); }
.light .search-hint { color: #71717a; }
.link { color: var(--amber); cursor: pointer; }
.link:hover { text-decoration: underline; }

/* ── Results ── */
.results-list {
  width: 100%; max-width: 480px;
  margin-top: 20px;
  display: flex; flex-direction: column; gap: 8px;
}

.result-card {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 14px; border-radius: 14px; border: 1px solid;
  cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s, background 0.2s, border-color 0.2s;
}
.dark .result-card {
  background: rgba(255,255,255,0.04);
  border-color: rgba(255,255,255,0.08);
}
.light .result-card {
  background: rgba(255,255,255,0.8);
  border-color: #e4e4e7;
}
.result-card:hover { transform: scale(1.012); }
.dark .result-card:hover {
  background: rgba(255,255,255,0.08);
  box-shadow: 0 4px 24px rgba(251,191,36,0.08);
}
.light .result-card:hover {
  background: #fff;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
}
.result-card:active { transform: scale(0.995); }

.date-badge {
  flex-shrink: 0; min-width: 52px;
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 6px; border-radius: 10px;
  transition: background 0.3s, color 0.3s;
}
.dark .date-badge { background: rgba(251,191,36,0.1); color: var(--amber); }
.light .date-badge { background: #fffbeb; color: #b45309; }
.date-badge .month { font-size: 9px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.7; line-height: 1; margin-bottom: 3px; }
.date-badge .day { font-size: 15px; font-weight: 800; line-height: 1; font-family: 'Sora', sans-serif; }

.result-info { flex: 1; min-width: 0; }
.result-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.price-tag {

.dark .price-tag { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.45); }
.light .price-tag { background: #f4f4f5; color: #71717a; }
.result-meta { display: flex; align-items: center; gap: 4px; margin-top: 3px; font-size: 11px; }

.chevron-icon { flex-shrink: 0; transition: color 0.2s, transform 0.18s; }

.results-footer { font-size: 11px; text-align: center; margin-top: 6px; }
.dark .results-footer { color: rgba(255,255,255,0.35); }
.light .results-footer { color: #71717a; }

/* ── Section label ── */
.section-label {

.section-wrap { width: 100%; max-width: 480px; margin-top: 72px; }

/* ── How-it-works cards ── */
.how-card {
  display: flex; align-items: flex-start; gap: 14px;

.how-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.how-desc { font-size: 12px; line-height: 1.5; }
.dark .how-desc { color: rgba(255,255,255,0.42); }
.light .how-desc { color: #71717a; }

/* ── Why grid ── */
.why-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;

.why-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.why-sub { font-size: 11px; line-height: 1.5; }
.dark .why-sub { color: rgba(255,255,255,0.42); }
.light .why-sub { color: #71717a; }

/* ── CTA ── */
.cta-wrap { margin-top: 72px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.cta-btn {
  display: inline-flex; align-items: center; gap: 8px;

.dark .cta-note { color: rgba(255,255,255,0.35); }
.light .cta-note { color: #71717a; }

/* ── Footer ── */
footer {
  margin-top: 80px; text-align: center; font-size: 12px; padding-bottom: 40px;
}
.dark footer { color: rgba(255,255,255,0.3); }
.light footer { color: #a1a1aa; }

.footer-links span:hover { color: var(--amber); }

/* ── Stagger delays ── */
.d0 { transition-delay: 0ms; }
.d1 { transition-delay: 80ms; }
.d2 { transition-delay: 160ms; }
.d3 { transition-delay: 240ms; }
.d4 { transition-delay: 320ms; }
.d5 { transition-delay: 400ms; }
.d6 { transition-delay: 480ms; }

@media (max-width: 520px) {
  .why-grid { grid-template-columns: 1fr; }
  h1.headline-main, h1.headline-accent { font-size: 36px; }
}

function Icon({ name, size = 16, strokeWidth = 1.8 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = "";
      const icons = window.lucide;

      const svg = iconFn([size, size], { stroke: "currentColor", "stroke-width": strokeWidth, fill: "none", "stroke-linecap": "round", "stroke-linejoin": "round" });

      }).join("") : "";

      const paths = {

        Moon: ['<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'],
        Sparkles: ['<path d="M12 3L13.5 8.5L19 10L13.5 11.5L12 17L10.5 11.5L5 10L10.5 8.5Z"/><path d="M5 3L5.5 5L7 5.5L5.5 6L5 8L4.5 6L3 5.5L4.5 5Z"/><path d="M19 13L19.5 15L21 15.5L19.5 16L19 18L18.5 16L17 15.5L18.5 15Z"/>'],
        ChevronRight: ['<polyline points="9,18 15,12 9,6"/>'],
        Flame: ['<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>'],

    <div className={pageClass}>
      {/* Toolbar */}
      <div className={tbClass}>
        <div className="logo-badge">EC</div>

        <div className="toolbar-divider" />

        {TB_ICONS.map(name => (
          <button key={name} className="tb-btn" title={name}>
            <Icon name={name} size={17} strokeWidth={1.8} />
          </button>
        ))}

        <div className="toolbar-divider" />

        <button className="tb-btn theme-btn" onClick={() => setDark(d => !d)} title="Toggle theme">
          <Icon name={dark ? "Sun" : "Moon"} size={17} strokeWidth={1.8} />
        </button>
      </div>

      {/* Atmospheric glow */}
      <div className="glow-wrap">
        <div className="glow-1" />
        <div className="glow-2" />
        {dark && <div className="dot-grid" />}
      </div>

      <main>
        {/* Badge */}
        <div className={`fade-in d0 ${visible ? "visible" : ""}`}>
          <span className="badge">
            <Icon name="Flame" size={11} />
            1,000+ energy events worldwide
          </span>
        </div>

        {/* Headline */}
        <div className={`fade-in d1 ${visible ? "visible" : ""}`} style={{ textAlign: "center" }}>
          <h1 className="headline-main">Where Energy Pros</h1>
          <h1 className="headline-accent">Find Events.</h1>
          <p className="sub">Comprehensive. Easy to use. Curated by energy insiders.</p>
        </div>

        {/* Search */}
        <div className={`fade-in d2 ${visible ? "visible" : ""} search-wrap`}>
          <span className="search-icon">
            <Icon name="Search" size={16} />
          </span>
          <input
            className="search-input"
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="hydrogen conference, Houston TX..."
          />
          <p className="search-hint">
            <span className="link">Sign in</span> or Sign up to search 1,000+ energy events
          </p>
        </div>

        {/* Results */}
        <div className={`fade-in d3 ${visible ? "visible" : ""} results-list`}>
          {EVENTS.map((ev, i) => (
            <div className="result-card" key={i}>
              <div className="date-badge">
                <span className="month">{ev.month}</span>
                <span className="day">{ev.day}</span>
              </div>
              <div className="result-info">
                <div className="result-name">
                  <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{ev.name}</span>
                  <span className="price-tag">{ev.price}</span>
                </div>
                <div className="result-meta">
                  <Icon name="MapPin" size={10} />
                  <span>{ev.city}</span>
                  <span className="dot" style={{ margin: "0 4px" }}>·</span>
                  <Icon name="Tag" size={10} />
                  <span>{ev.segment}</span>
                </div>
              </div>
              <span className="chevron-icon"><Icon name="ChevronRight" size={14} /></span>
            </div>
          ))}
          <p className="results-footer">
            Showing 5 of 1,000+ events · <span className="link">View all results</span>
          </p>
        </div>

        {/* How it works */}
        <div className={`fade-in d4 ${visible ? "visible" : ""} section-wrap`}>
          <p className="section-label">Find Energy Events Fast</p>
          {HOW.map(({ iconName, title, desc }) => (
            <div className="how-card" key={title}>
              <div className="how-icon"><Icon name={iconName} size={16} /></div>
              <div>
                <div className="how-title">{title}</div>
                <div className="how-desc">{desc}</div>
              </div>
            </div>
          ))}
        </div>

        {/* Why */}
        <div className={`fade-in d5 ${visible ? "visible" : ""} section-wrap`}>
          <p className="section-label">Why EnergyCalendar?</p>
          <div className="why-grid">
            {WHY.map(({ iconName, title, sub }) => (
              <div className="why-card" key={title}>
                <div className="why-icon"><Icon name={iconName} size={15} /></div>
                <div className="why-title">{title}</div>
                <div className="why-sub">{sub}</div>
              </div>
            ))}
          </div>
        </div>

        {/* CTA */}
        <div className={`fade-in d6 ${visible ? "visible" : ""} cta-wrap`}>
          <button className="cta-btn">
            <Icon name="Sparkles" size={15} />
            Get Started Free
            <Icon name="ChevronRight" size={14} />
          </button>
          <p className="cta-note">No credit card required</p>
        </div>

        {/* Footer */}
        <footer>
          <div className="footer-links">
            {["LinkedIn","X","Instagram","Facebook","TikTok"].map(s => (
              <span key={s}>{s}</span>
            ))}
          </div>
          <p>© 2026 EnergyCalendar.com · Houston, TX</p>
        </footer>
      </main>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>

</body>
</html>
